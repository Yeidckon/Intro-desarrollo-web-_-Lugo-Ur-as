<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Lugo Urías Yeidckon Zaid : P22</title>
    <style>
      body {
        background: #f0f2f5;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        padding: 40px 20px;
      }

      .contenedor {
        background: #1a4b8c;
        color: #ffffff;
        border-radius: 10px;
        padding: 32px 36px;
        width: 100%;
        max-width: 400px;
      }

      h2 {
        margin-bottom: 24px;
        font-size: 18px;
      }

      label {
        display: block;
        margin-bottom: 4px;
        font-size: 14px;
      }

      input {
        width: 100%;
        padding: 8px 10px;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        margin-bottom: 16px;
      }

      button {
        width: 100%;
        padding: 10px;
        background: #ffffff;
        color: #1a4b8c;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 4px;
      }

      button:hover {
        background: #e0e8f5;
      }

      #resultado {
        margin-top: 20px;
        font-size: 16px;
        font-weight: bold;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <h2>Fórmula General, Formularios y JavaScript</h2>

      <label>Variable A:</label>
      <input type="number" id="ValorA">

      <label>Variable B:</label>
      <input type="number" id="ValorB">

      <label>Variable C:</label>
      <input type="number" id="ValorC">

      <button onclick="calcular()">Calcular</button>

      <p id="resultado"></p>
    </div>

    <script>
      function calcular() {
        var a = parseFloat(document.getElementById("ValorA").value);
        var b = parseFloat(document.getElementById("ValorB").value);
        var c = parseFloat(document.getElementById("ValorC").value);

        var discriminante = (b * b) - (4 * a * c);

        if (discriminante < 0) {
          document.getElementById("resultado").innerHTML =
            "No tiene solución real (discriminante negativo)";
        } else {
          var x1 = (-b + Math.sqrt(discriminante)) / (2 * a);
          var x2 = (-b - Math.sqrt(discriminante)) / (2 * a);

          document.getElementById("resultado").innerHTML =
            "x1 = " + x1 + "<br>" + "x2 = " + x2;
        }
      }
    </script>

  </body>
</html>
