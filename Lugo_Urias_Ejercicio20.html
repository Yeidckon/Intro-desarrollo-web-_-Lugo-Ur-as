<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Lugo Urías Yeidckon Zaid : P20</title>
  </head>
  <body>
    <h2>Operaciones Aritméticas con JavaScript</h2>

    <p id="suma"></p>
    <p id="resta"></p>
    <p id="division"></p>
    <p id="exponenciacion"></p>

    <script>
      //Declaracion y asignacion
      var a = 10;
      var b = 3;

      // Realizar la opeacion e imprimir
      document.getElementById("suma").innerHTML           = "Suma: "            + a + " + " + b + " = " + (a + b);
      document.getElementById("resta").innerHTML          = "Resta: "           + a + " - " + b + " = " + (a - b);
      document.getElementById("division").innerHTML       = "División: "        + a + " / " + b + " = " + (a / b);
      document.getElementById("exponenciacion").innerHTML = "Exponenciación: "  + a + " ** " + b + " = " + (a ** b);
    </script>
  </body>
</html>
